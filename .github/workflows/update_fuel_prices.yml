name: 오피넷 유가 자동 업데이트

on:
  schedule:
    # 매일 오전 9시 (KST = UTC 0시)
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 오피넷 유가 스크래핑
        run: python scripts/scrape_fuel_prices.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add fuel_prices.json
          git diff --cached --quiet || git commit -m "🛢️ 유가 자동 업데이트: $(date +'%Y-%m-%d')"
          git push
